name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -W error

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run coverage
        run: pytest -W error --cov=app --cov-report=term-missing --cov-report=xml --cov-report=json

      - name: Enforce per-module coverage
        run: |
          python - <<'PY'
          import json
          import sys

          threshold = 95.0
          with open("coverage.json", encoding="utf-8") as coverage_file:
              coverage_data = json.load(coverage_file)

          failed_modules = []
          for module_path, module_data in sorted(coverage_data["files"].items()):
              summary = module_data["summary"]
              statements = summary["num_statements"]
              percent = summary["percent_covered"]
              if statements > 0 and percent < threshold:
                  failed_modules.append((module_path, percent))

          if failed_modules:
              print(f"Modules below {threshold:.0f}% coverage:")
              for module_path, percent in failed_modules:
                  print(f"- {module_path}: {percent:.2f}%")
              sys.exit(1)

          print(f"All modules meet the {threshold:.0f}% coverage threshold.")
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage.xml
            backend/coverage.json
